<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Oyunu 🧩</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8EC;
    --primary: #FF6B6B;
    --secondary: #4ECDC4;
    --accent: #FFE66D;
    --purple: #A78BFA;
    --green: #6BCB77;
    --dark: #2D2D2D;
    --card: #FFFFFF;
    --shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Floating shapes background */
  .bg-shapes {
    position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
  }
  .bg-shapes span {
    position: absolute; border-radius: 50%; opacity: 0.15;
    animation: floatShape 8s ease-in-out infinite;
  }
  .bg-shapes span:nth-child(1){width:120px;height:120px;background:var(--primary);top:10%;left:5%;animation-delay:0s}
  .bg-shapes span:nth-child(2){width:80px;height:80px;background:var(--secondary);top:60%;left:2%;animation-delay:2s}
  .bg-shapes span:nth-child(3){width:100px;height:100px;background:var(--purple);top:20%;right:5%;animation-delay:1s}
  .bg-shapes span:nth-child(4){width:60px;height:60px;background:var(--accent);top:75%;right:8%;animation-delay:3s}
  .bg-shapes span:nth-child(5){width:90px;height:90px;background:var(--green);top:45%;left:50%;animation-delay:1.5s}
  @keyframes floatShape {
    0%,100%{transform:translateY(0) rotate(0deg)}
    50%{transform:translateY(-30px) rotate(180deg)}
  }

  .container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 16px; }

  /* Header */
  header {
    text-align: center; padding: 24px 16px 16px;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2rem, 8vw, 3.5rem);
    color: var(--primary);
    text-shadow: 4px 4px 0 var(--accent), 6px 6px 0 rgba(0,0,0,0.1);
    letter-spacing: 2px;
  }
  header p { color: #888; font-size: 1rem; margin-top: 4px; font-weight: 600; }

  /* Screen management */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== MENU SCREEN ===== */
  #menuScreen { text-align: center; }

  .menu-card {
    background: var(--card);
    border-radius: 28px;
    padding: 28px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .menu-card h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: var(--dark);
    margin-bottom: 16px;
  }

  /* Gallery grid */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .gallery-item {
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    border: 4px solid transparent;
    transition: all 0.25s;
    aspect-ratio: 1;
    position: relative;
  }
  .gallery-item img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.3s;
  }
  .gallery-item:hover img { transform: scale(1.08); }
  .gallery-item.selected {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--accent);
    transform: scale(1.05);
  }
  .gallery-item .check {
    position: absolute; top: 6px; right: 6px;
    background: var(--primary); color: white;
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; opacity: 0; transition: opacity 0.2s;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .gallery-item.selected .check { opacity: 1; }

  /* Upload */
  .upload-area {
    border: 3px dashed #ccc;
    border-radius: 20px;
    padding: 28px;
    cursor: pointer;
    transition: all 0.2s;
    background: #fafafa;
  }
  .upload-area:hover { border-color: var(--secondary); background: #f0fffe; }
  .upload-area input { display: none; }
  .upload-area .icon { font-size: 2.5rem; margin-bottom: 8px; }
  .upload-area p { color: #888; font-weight: 600; }

  /* Difficulty */
  .diff-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .diff-btn {
    padding: 10px 22px;
    border-radius: 50px;
    border: 3px solid transparent;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 400;
  }
  .diff-btn[data-diff="easy"] { background: #dcfce7; color: #16a34a; border-color: #86efac; }
  .diff-btn[data-diff="medium"] { background: #fef9c3; color: #ca8a04; border-color: #fde047; }
  .diff-btn[data-diff="hard"] { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
  .diff-btn.selected, .diff-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    border-width: 3px;
  }
  .diff-btn[data-diff="easy"].selected { background: #16a34a; color: white; }
  .diff-btn[data-diff="medium"].selected { background: #ca8a04; color: white; }
  .diff-btn[data-diff="hard"].selected { background: #dc2626; color: white; }

  /* Start button */
  .btn-start {
    background: linear-gradient(135deg, var(--primary), #ff8c42);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,107,107,0.4);
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-start:hover { transform: translateY(-3px) scale(1.04); box-shadow: 0 12px 30px rgba(255,107,107,0.5); }
  .btn-start:active { transform: translateY(0) scale(0.98); }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ===== GAME SCREEN ===== */
  #gameScreen {}

  .game-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0; margin-bottom: 12px;
  }
  .btn-back {
    background: white; border: 3px solid #eee;
    border-radius: 50px; padding: 8px 18px;
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem; color: #666;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-back:hover { border-color: var(--primary); color: var(--primary); }

  .game-stats {
    display: flex; gap: 12px;
  }
  .stat-badge {
    background: white;
    border-radius: 50px;
    padding: 6px 16px;
    font-weight: 800;
    font-size: 0.9rem;
    box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    display: flex; align-items: center; gap: 5px;
  }
  .stat-badge.moves { color: var(--purple); }
  .stat-badge.timer { color: var(--primary); }

  /* Preview & Puzzle container */
  .game-layout {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 16px;
    align-items: start;
  }
  @media(max-width: 600px) {
    .game-layout { grid-template-columns: 1fr; }
  }

  .preview-card {
    background: white;
    border-radius: 20px;
    padding: 12px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .preview-card h3 {
    font-family: 'Fredoka One', cursive;
    color: #888; font-size: 0.9rem; margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .preview-card img {
    width: 100%; border-radius: 12px;
    border: 3px solid var(--accent);
  }

  /* Puzzle board */
  .puzzle-wrap {
    background: white;
    border-radius: 24px;
    padding: 16px;
    box-shadow: var(--shadow);
  }
  #puzzleBoard {
    display: grid;
    gap: 4px;
    width: 100%;
    aspect-ratio: 1;
    margin: 0 auto;
    max-width: 500px;
  }

  .puzzle-piece {
    border-radius: 8px;
    cursor: grab;
    transition: transform 0.15s, box-shadow 0.15s;
    overflow: hidden;
    background-size: cover;
    background-repeat: no-repeat;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    position: relative;
    border: 2px solid rgba(255,255,255,0.6);
  }
  .puzzle-piece:hover { transform: scale(1.06); z-index: 10; box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
  .puzzle-piece.dragging { opacity: 0.5; cursor: grabbing; transform: scale(1.1); z-index: 100; }
  .puzzle-piece.correct {
    border-color: var(--green) !important;
    box-shadow: 0 0 0 3px var(--green), inset 0 0 0 2px rgba(255,255,255,0.5);
    cursor: default;
  }
  .puzzle-piece.selected-piece {
    border-color: var(--accent) !important;
    box-shadow: 0 0 0 4px var(--primary), 0 0 20px rgba(255,107,107,0.5);
    transform: scale(1.08);
    z-index: 10;
    cursor: grab;
  }
  .puzzle-piece.over { transform: scale(1.08); box-shadow: 0 0 0 3px var(--accent); }

  /* Shuffle hint area */
  .puzzle-actions {
    display: flex; justify-content: center; gap: 10px;
    margin-top: 12px; flex-wrap: wrap;
  }
  .btn-action {
    background: white; border: 3px solid #eee;
    border-radius: 50px; padding: 8px 20px;
    font-family: 'Fredoka One', cursive; font-size: 0.95rem;
    cursor: pointer; transition: all 0.2s; color: var(--dark);
  }
  .btn-action:hover { border-color: var(--secondary); color: var(--secondary); transform: scale(1.05); }

  /* ===== WIN SCREEN ===== */
  #winScreen { text-align: center; }
  .win-card {
    background: white;
    border-radius: 32px;
    padding: 40px 28px;
    box-shadow: var(--shadow);
    max-width: 480px;
    margin: 0 auto;
  }
  .win-emoji { font-size: 4rem; margin-bottom: 8px; animation: bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from { transform: translateY(0) } to { transform: translateY(-16px) } }
  .win-card h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem; color: var(--primary);
    margin-bottom: 8px;
  }
  .win-card p { color: #888; font-size: 1rem; margin-bottom: 20px; font-weight: 600; }
  .win-stats {
    display: flex; gap: 16px; justify-content: center; margin-bottom: 24px;
  }
  .win-stat {
    background: var(--bg);
    border-radius: 16px;
    padding: 12px 20px;
  }
  .win-stat .value {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem; color: var(--dark);
  }
  .win-stat .label { font-size: 0.8rem; color: #aaa; font-weight: 700; }
  .win-img {
    width: 100%; max-width: 240px;
    border-radius: 16px;
    margin: 0 auto 24px;
    display: block;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    border: 4px solid var(--accent);
  }
  .win-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn-win {
    padding: 13px 28px;
    border-radius: 50px;
    border: none;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-win.primary { background: linear-gradient(135deg, var(--primary), #ff8c42); color: white; box-shadow: 0 6px 20px rgba(255,107,107,0.4); }
  .btn-win.secondary { background: white; color: var(--dark); border: 3px solid #eee; }
  .btn-win:hover { transform: translateY(-2px) scale(1.04); }

  /* Stars */
  .stars { font-size: 2rem; margin-bottom: 8px; letter-spacing: 4px; }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px; height: 10px;
    top: -20px;
    animation: confettiFall linear forwards;
    z-index: 999;
    pointer-events: none;
    border-radius: 2px;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 200px; font-family: 'Fredoka One', cursive;
    font-size: 1.2rem; color: #aaa;
  }
  .loading::after {
    content: ''; width: 30px; height: 30px;
    border: 4px solid #eee; border-top-color: var(--primary);
    border-radius: 50%; margin-left: 12px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive tweaks */
  @media(max-width: 480px) {
    .game-stats { gap: 6px; }
    .stat-badge { font-size: 0.8rem; padding: 5px 10px; }
    .preview-card { display: none; }
    .game-layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="bg-shapes">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="container">
  <header>
    <h1>🧩 Puzzle Oyunu</h1>
    <p>Parçaları birleştir, resmi tamamla!</p>
  </header>

  <!-- MENU SCREEN -->
  <div id="menuScreen" class="screen active">
    <!-- Photo Selection -->
    <div class="menu-card">
      <h2>📸 Bir Fotoğraf Seç</h2>
      <div class="gallery" id="gallery"></div>

      <div class="upload-area" onclick="document.getElementById('uploadInput').click()">
        <input type="file" id="uploadInput" accept="image/*" onchange="handleUpload(event)">
        <div class="icon">📁</div>
        <p>Kendi fotoğrafını yükle</p>
      </div>
    </div>

    <!-- Difficulty -->
    <div class="menu-card">
      <h2>⭐ Zorluk Seviyesi</h2>
      <div class="diff-btns">
        <button class="diff-btn selected" data-diff="easy" onclick="selectDiff(this)">😊 Kolay (3×3)</button>
        <button class="diff-btn" data-diff="medium" onclick="selectDiff(this)">🤔 Orta (4×4)</button>
        <button class="diff-btn" data-diff="hard" onclick="selectDiff(this)">🔥 Zor (5×5)</button>
      </div>
    </div>

    <div style="text-align:center">
      <button class="btn-start" id="startBtn" onclick="startGame()" disabled>
        🎮 Oyuna Başla!
      </button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen" class="screen">
    <div class="game-header">
      <button class="btn-back" onclick="goMenu()">← Geri</button>
      <div class="game-stats">
        <div class="stat-badge moves">🖐️ <span id="movesCount">0</span></div>
        <div class="stat-badge timer">⏱️ <span id="timerDisplay">0:00</span></div>
      </div>
    </div>

    <div class="game-layout">
      <div class="preview-card">
        <h3>Orijinal</h3>
        <img id="previewImg" src="" alt="preview">
      </div>
      <div class="puzzle-wrap">
        <div id="puzzleBoard"></div>
        <div class="puzzle-actions">
          <button class="btn-action" onclick="shufflePieces()">🔀 Karıştır</button>
          <button class="btn-action" onclick="togglePreview()">👁 Göster/Gizle</button>
        </div>
      </div>
    </div>
  </div>

  <!-- WIN SCREEN -->
  <div id="winScreen" class="screen">
    <div class="win-card">
      <div class="win-emoji">🎉</div>
      <div class="stars" id="winStars">⭐⭐⭐</div>
      <h2>Tebrikler!</h2>
      <p id="winMsg">Puzzle'ı başarıyla tamamladın!</p>
      <img id="winImg" class="win-img" src="" alt="completed">
      <div class="win-stats">
        <div class="win-stat">
          <div class="value" id="finalMoves">0</div>
          <div class="label">HAMİLE</div>
        </div>
        <div class="win-stat">
          <div class="value" id="finalTime">0:00</div>
          <div class="label">SÜRE</div>
        </div>
      </div>
      <div class="win-btns">
        <button class="btn-win primary" onclick="playAgain()">🔄 Tekrar Oyna</button>
        <button class="btn-win secondary" onclick="goMenu()">🏠 Ana Menü</button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── Built-in photos (using picsum for variety) ───────────────────────────
const BUILT_IN_IMAGES = [
  { src: 'https://picsum.photos/seed/animals1/500/500', label: '🐘 Hayvan' },
  { src: 'https://picsum.photos/seed/nature2/500/500', label: '🌸 Doğa' },
  { src: 'https://picsum.photos/seed/city3/500/500', label: '🏙️ Şehir' },
  { src: 'https://picsum.photos/seed/food4/500/500', label: '🍎 Meyve' },
  { src: 'https://picsum.photos/seed/sea5/500/500', label: '🌊 Deniz' },
  { src: 'https://picsum.photos/seed/flower6/500/500', label: '🌻 Çiçek' },
];

const DIFF_SETTINGS = {
  easy:   { grid: 3, label: 'Kolay' },
  medium: { grid: 4, label: 'Orta' },
  hard:   { grid: 5, label: 'Zor' },
};

// ─── State ────────────────────────────────────────────────────────────────
let selectedImage = null;
let selectedDiff = 'easy';
let moves = 0;
let timerInterval = null;
let startTime = null;
let correctCount = 0;
let totalPieces = 0;
let previewVisible = true;
let currentGrid = 3;

// pieceOrder[i] = which "correct index" piece is sitting at slot i
let pieceOrder = [];

// Drag state
let dragSrcSlot = null;

// Touch state
let touchSrcSlot = null;
let touchClone = null;
let touchOffsetX = 0;
let touchOffsetY = 0;

// Click-to-select state (tap first piece, then tap second to swap)
let selectedSlot = null;

// ─── Init gallery ─────────────────────────────────────────────────────────
function initGallery() {
  const gallery = document.getElementById('gallery');
  BUILT_IN_IMAGES.forEach((img, i) => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    item.dataset.index = i;
    item.innerHTML = `<img src="${img.src}" alt="${img.label}" loading="lazy"><div class="check">✓</div>`;
    item.onclick = () => selectGalleryImage(item, img.src);
    gallery.appendChild(item);
  });
}

function selectGalleryImage(el, src) {
  document.querySelectorAll('.gallery-item').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
  selectedImage = src;
  document.getElementById('startBtn').disabled = false;
}

function handleUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    selectedImage = ev.target.result;
    document.querySelectorAll('.gallery-item').forEach(i => i.classList.remove('selected'));
    document.getElementById('startBtn').disabled = false;

    // Show uploaded thumb in gallery
    const existing = document.getElementById('uploadThumb');
    if (existing) existing.remove();
    const item = document.createElement('div');
    item.className = 'gallery-item selected';
    item.id = 'uploadThumb';
    item.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover"><div class="check">✓</div>`;
    item.onclick = () => {
      document.querySelectorAll('.gallery-item').forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');
      selectedImage = ev.target.result;
    };
    document.getElementById('gallery').prepend(item);
  };
  reader.readAsDataURL(file);
}

function selectDiff(btn) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedDiff = btn.dataset.diff;
}

// ─── Screen helpers ───────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goMenu() {
  stopTimer();
  showScreen('menuScreen');
}

// ─── Game Start ───────────────────────────────────────────────────────────
function startGame() {
  if (!selectedImage) return;
  moves = 0;
  correctCount = 0;
  selectedSlot = null;
  document.getElementById('movesCount').textContent = 0;
  document.getElementById('timerDisplay').textContent = '0:00';

  const grid = DIFF_SETTINGS[selectedDiff].grid;
  totalPieces = grid * grid;

  document.getElementById('previewImg').src = selectedImage;
  document.getElementById('winImg').src = selectedImage;

  showScreen('gameScreen');

  // Preload image so backgroundSize is accurate
  const img = new Image();
  img.onload = () => {
    buildPuzzle(selectedImage, grid);
    startTimer();
  };
  img.src = selectedImage;
}

function buildPuzzle(imgSrc, grid) {
  currentGrid = grid;
  const board = document.getElementById('puzzleBoard');
  board.innerHTML = '';
  board.style.gridTemplateColumns = `repeat(${grid}, 1fr)`;

  // Init order: [0,1,2,...,n-1]
  pieceOrder = Array.from({ length: grid * grid }, (_, i) => i);
  selectedSlot = null;

  // Create slot divs (they stay fixed in the grid)
  for (let i = 0; i < grid * grid; i++) {
    const slot = document.createElement('div');
    slot.className = 'puzzle-piece';
    slot.dataset.slot = i;
    slot.style.width = '100%';
    slot.style.paddingBottom = '100%';
    slot.draggable = true;

    slot.addEventListener('dragstart', onDragStart);
    slot.addEventListener('dragover', onDragOver);
    slot.addEventListener('dragleave', onDragLeave);
    slot.addEventListener('drop', onDrop);
    slot.addEventListener('dragend', onDragEnd);
    slot.addEventListener('touchstart', onTouchStart, { passive: false });
    slot.addEventListener('touchmove', onTouchMove, { passive: false });
    slot.addEventListener('touchend', onTouchEnd);
    slot.addEventListener('click', onSlotClick);

    board.appendChild(slot);
  }

  shufflePieces();
}

// Apply current pieceOrder to all slot visuals
function renderPieces() {
  const grid = currentGrid;
  const slots = document.querySelectorAll('.puzzle-piece');
  slots.forEach((slot, i) => {
    const correctIdx = pieceOrder[i];
    const r = Math.floor(correctIdx / grid);
    const c = correctIdx % grid;
    const xPct = (c / (grid - 1)) * 100;
    const yPct = (r / (grid - 1)) * 100;

    slot.style.backgroundImage = `url(${selectedImage})`;
    slot.style.backgroundSize = `${grid * 100}%`;
    slot.style.backgroundPosition = `${xPct}% ${yPct}%`;

    // Correct highlight
    if (pieceOrder[i] === i) {
      slot.classList.add('correct');
    } else {
      slot.classList.remove('correct');
    }

    // Selected highlight
    if (selectedSlot === i) {
      slot.classList.add('selected-piece');
    } else {
      slot.classList.remove('selected-piece');
    }
  });
}

// ─── Shuffle ──────────────────────────────────────────────────────────────
function shufflePieces() {
  // Fisher-Yates on pieceOrder
  for (let i = pieceOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pieceOrder[i], pieceOrder[j]] = [pieceOrder[j], pieceOrder[i]];
  }
  // Ensure not accidentally solved
  if (pieceOrder.every((v, i) => v === i)) {
    [pieceOrder[0], pieceOrder[1]] = [pieceOrder[1], pieceOrder[0]];
  }
  correctCount = 0;
  selectedSlot = null;
  renderPieces();
  checkAllCorrect();
}

// ─── Drag & Drop ─────────────────────────────────────────────────────────
function onDragStart(e) {
  const slot = parseInt(this.dataset.slot);
  if (pieceOrder[slot] === slot) { e.preventDefault(); return; } // correct piece locked
  dragSrcSlot = slot;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', slot);
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const slot = parseInt(this.dataset.slot);
  if (slot !== dragSrcSlot) this.classList.add('over');
}
function onDragLeave() { this.classList.remove('over'); }
function onDrop(e) {
  e.stopPropagation();
  this.classList.remove('over');
  const destSlot = parseInt(this.dataset.slot);
  if (dragSrcSlot === null || destSlot === dragSrcSlot) return;
  if (pieceOrder[destSlot] === destSlot) return; // dest is locked correct
  doSwap(dragSrcSlot, destSlot);
  dragSrcSlot = null;
}
function onDragEnd() {
  dragSrcSlot = null;
  document.querySelectorAll('.puzzle-piece').forEach(p => {
    p.classList.remove('dragging');
    p.classList.remove('over');
  });
}

// ─── Touch ────────────────────────────────────────────────────────────────
function onTouchStart(e) {
  e.preventDefault();
  const slot = parseInt(this.dataset.slot);
  if (pieceOrder[slot] === slot) return; // locked

  touchSrcSlot = slot;
  const t = e.touches[0];
  const rect = this.getBoundingClientRect();

  // Offset from finger to piece top-left (so piece doesn't jump)
  touchOffsetX = t.clientX - rect.left;
  touchOffsetY = t.clientY - rect.top;

  touchClone = this.cloneNode(true);
  Object.assign(touchClone.style, {
    position: 'fixed',
    zIndex: '9999',
    opacity: '0.9',
    pointerEvents: 'none',
    width: rect.width + 'px',
    height: rect.height + 'px',
    top: (t.clientY - touchOffsetY) + 'px',
    left: (t.clientX - touchOffsetX) + 'px',
    borderRadius: '8px',
    boxShadow: '0 16px 40px rgba(0,0,0,0.35)',
    transition: 'none',
    transform: 'scale(1.1)',
  });
  document.body.appendChild(touchClone);
  this.style.opacity = '0.25';
}

function onTouchMove(e) {
  e.preventDefault();
  if (!touchClone) return;
  const t = e.touches[0];
  touchClone.style.left = (t.clientX - touchOffsetX) + 'px';
  touchClone.style.top = (t.clientY - touchOffsetY) + 'px';
}

function onTouchEnd(e) {
  if (touchSrcSlot === null || !touchClone) return;
  touchClone.remove();
  touchClone = null;

  const slot = document.querySelector(`.puzzle-piece[data-slot="${touchSrcSlot}"]`);
  if (slot) slot.style.opacity = '';

  const t = e.changedTouches[0];
  // Find which slot is under the center of the dragged clone
  const centerX = t.clientX - touchOffsetX + (parseFloat(document.querySelector('.puzzle-piece').getBoundingClientRect().width) / 2);
  const centerY = t.clientY - touchOffsetY + (parseFloat(document.querySelector('.puzzle-piece').getBoundingClientRect().height) / 2);
  const target = document.elementFromPoint(t.clientX, t.clientY);
  const destPiece = target?.closest('.puzzle-piece');

  if (destPiece) {
    const destSlot = parseInt(destPiece.dataset.slot);
    if (destSlot !== touchSrcSlot && pieceOrder[destSlot] !== destSlot) {
      doSwap(touchSrcSlot, destSlot);
    }
  }
  touchSrcSlot = null;
}

// ─── Click-to-select swap ─────────────────────────────────────────────────
function onSlotClick(e) {
  // Only trigger if not a drag (dragend fires before click, so check flag)
  const slot = parseInt(this.dataset.slot);
  if (pieceOrder[slot] === slot) return; // locked, ignore

  if (selectedSlot === null) {
    // First selection
    selectedSlot = slot;
    renderPieces();
  } else if (selectedSlot === slot) {
    // Deselect
    selectedSlot = null;
    renderPieces();
  } else {
    // Swap
    if (pieceOrder[slot] !== slot) {
      doSwap(selectedSlot, slot);
    }
    selectedSlot = null;
  }
}

// ─── Core Swap ────────────────────────────────────────────────────────────
function doSwap(slotA, slotB) {
  [pieceOrder[slotA], pieceOrder[slotB]] = [pieceOrder[slotB], pieceOrder[slotA]];
  moves++;
  document.getElementById('movesCount').textContent = moves;
  selectedSlot = null;
  renderPieces();
  checkCorrectPieces();
  checkAllCorrect();
}

// ─── Check ────────────────────────────────────────────────────────────────
function checkCorrectPieces() {
  correctCount = pieceOrder.filter((v, i) => v === i).length;
}

function checkAllCorrect() {
  if (correctCount === totalPieces && totalPieces > 0) {
    setTimeout(showWin, 500);
  }
}

// ─── Timer ────────────────────────────────────────────────────────────────
function startTimer() {
  stopTimer();
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 500);
}
function stopTimer() {
  clearInterval(timerInterval);
}
function getElapsedTime() {
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

// ─── Win ──────────────────────────────────────────────────────────────────
function showWin() {
  stopTimer();
  const timeStr = getElapsedTime();
  const elapsed = Math.floor((Date.now() - startTime) / 1000);

  // Stars based on moves and difficulty
  const grid = DIFF_SETTINGS[selectedDiff].grid;
  const maxGoodMoves = grid * grid * 2;
  let stars = 3;
  if (moves > maxGoodMoves * 2) stars = 1;
  else if (moves > maxGoodMoves) stars = 2;

  document.getElementById('winStars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3 - stars);
  document.getElementById('finalMoves').textContent = moves;
  document.getElementById('finalTime').textContent = timeStr;

  const msgs = ['Harika iş çıkardın! 🌟', 'Süpersin! 🚀', 'Bravo! 🎊', 'Mükemmel! 🏆'];
  document.getElementById('winMsg').textContent = msgs[Math.floor(Math.random() * msgs.length)];

  showScreen('winScreen');
  launchConfetti();
}

function playAgain() {
  startGame();
}

// ─── Toggle preview ───────────────────────────────────────────────────────
function togglePreview() {
  const preview = document.querySelector('.preview-card');
  previewVisible = !previewVisible;
  preview.style.display = previewVisible ? '' : 'none';
}

// ─── Confetti ─────────────────────────────────────────────────────────────
function launchConfetti() {
  const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#A78BFA','#6BCB77','#FF8C42'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    el.style.animationDelay = Math.random() * 0.8 + 's';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.transform = `rotate(${Math.random() * 360}deg)`;
    el.style.width = el.style.height = (8 + Math.random() * 10) + 'px';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────
initGallery();
</script>
